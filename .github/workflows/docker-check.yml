name: Docker Image Check

on:
  workflow_run:
    workflows: ["Docker Image CI"] # Nombre del workflow de publicación (docker-publish.yml)
    types:
      - completed # Se ejecuta cuando el workflow de publicación ha terminado

jobs:
  check_api:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }} # Solo si el workflow de publicación fue exitoso

    env:
      DOCKER_IMAGE_TAG: "" # Variable para almacenar el tag de la imagen

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Download image tag artifact
      uses: actions/download-artifact@v3
      with:
        name: image-tag
        github-token: ${{ secrets.GITHUB_TOKEN }} # Necesario para descargar artefactos de otros workflows
        path: .

    - name: Read image tag
      run: echo "DOCKER_IMAGE_TAG=$(cat image_tag.txt)" >> $GITHUB_ENV

    - name: Create docker-compose override for testing published image
      run: |
        cat <<EOF > docker-compose.override.yml
        version: '3.8'
        services:
          web:
            image: ${{ env.DOCKER_IMAGE_TAG }}
            # Anulamos la instrucción 'build' y los 'volumes' para asegurarnos de que se usa la imagen publicada
            build: {} # Un mapa vacío anula la instrucción 'build' del docker-compose.yml base
            volumes: [] # Una lista vacía anula los volúmenes montados del docker-compose.yml base
EOF

    - name: Run Docker Compose services with published image
      run: |
        # Levanta los servicios usando el docker-compose.yml principal y el override
        docker-compose -f docker-compose.yml -f docker-compose.override.yml up -d

    - name: Wait for PostgreSQL to be ready
      run: |
        # Espera a que el servicio 'db' (PostgreSQL) esté saludable
        docker-compose ps
        until docker-compose exec db pg_isready -U postgres -d xulpymoney; do
          echo "Waiting for PostgreSQL to become ready..."
          sleep 2
        done

    - name: Run Django Migrations
      run: |
        # Ejecuta las migraciones de Django dentro del contenedor 'web' (usando la imagen publicada)
        docker-compose -f docker-compose.yml -f docker-compose.override.yml exec web python manage.py migrate

    - name: Wait for Django web service to be ready
      run: |
        # Espera a que el servicio web esté accesible en el puerto 8000
        # Asume que tienes un endpoint /healthcheck/ en tu aplicación Django.
        # Si no lo tienes, puedes usar un simple 'sleep 30' o un chequeo de logs.
        for i in $(seq 1 60); do # Intenta durante 60 segundos
          if curl -s http://localhost:8000/ > /dev/null; then # Intenta acceder a la raíz de la app
            echo "Django app is ready!"
            break
          fi
          echo "Waiting for Django app to be ready... ($i/60)"
          sleep 1
        done

    - name: Clean up Docker Compose services
      if: always() # Asegura que este paso se ejecute incluso si los pasos anteriores fallan
      run: |
        docker-compose -f docker-compose.yml -f docker-compose.override.yml down --volumes